<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Разработка сайтов под ключ: лендинги, многостраничные сайты, React-фронтенды, анимации, редизайн и уникальные проекты с сильной подачей и понятной логикой заявки."
    />
    <meta name="theme-color" content="#040507" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://site-for-selling.vercel.app" />
    <title>Разработка сайтов под ключ | Exestination Studio</title>
    <script>
      ;(() => {
        const canonicalOrigin = 'https://site-for-selling.vercel.app'
        const canonicalHost = 'site-for-selling.vercel.app'
        const { hostname, pathname, search, hash } = window.location

        if (hostname.endsWith('.vercel.app') && hostname !== canonicalHost) {
          window.location.replace(`${canonicalOrigin}${pathname}${search}${hash}`)
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
